*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
.header{background:#0f0f0f;padding:14px 20px;border-bottom:1px solid #272727}
.logo{font-size:22px;font-weight:bold;color:#fff}.logo span{color:#3ea6ff}
.tagline{font-size:10px;color:#aaa;margin-top:2px}
.market-bar{display:flex;gap:10px;padding:12px 20px;background:#0f0f0f;border-bottom:1px solid #272727;flex-wrap:wrap}
.mkt-btn{display:flex;align-items:center;gap:8px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:bold;border:2px solid #303030;background:#1a1a1a;color:#aaa;cursor:pointer;transition:all 0.2s}
.mkt-btn:hover{border-color:#3ea6ff;color:#fff}
.mkt-btn.active{border-color:#3ea6ff;background:#0d2137;color:#3ea6ff}
.mkt-btn img{width:28px;height:28px;object-fit:contain;border-radius:4px}
.cat-bar{display:flex;gap:8px;padding:10px 20px;background:#181818;border-bottom:1px solid #272727;flex-wrap:wrap}
.cat-btn{padding:6px 16px;border-radius:20px;font-size:12px;border:1px solid #303030;background:#272727;color:#fff;cursor:pointer;transition:all 0.2s}
.cat-btn.active{background:#3ea6ff;color:#0f0f0f;border-color:#3ea6ff;font-weight:bold}
.section{padding:16px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.card{background:#1a1a1a;border-radius:12px;overflow:hidden;border:1px solid #272727;transition:all 0.2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);border-color:#3ea6ff}
.card-thumb{height:150px;display:flex;align-items:center;justify-content:center;background:#222;position:relative}
.card-badge{position:absolute;top:8px;left:8px;background:#3ea6ff;color:#0f0f0f;font-size:9px;font-weight:bold;padding:2px 8px;border-radius:4px}
.card-price-tag{position:absolute;bottom:8px;right:8px;background:#ff0000;color:#fff;font-size:10px;font-weight:bold;padding:3px 8px;border-radius:4px}
.card-price-tag.soon{background:#555}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-name{font-size:13px;font-weight:bold;color:#fff;line-height:1.3}
.spec-row{display:flex;align-items:center;gap:5px;font-size:10px;color:#aaa}
.spec-icon{font-size:11px;width:16px;text-align:center}
.card-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:#3ea6ff;color:#0f0f0f;padding:8px;border-radius:6px;font-size:11px;font-weight:bold;text-decoration:none;margin-top:auto;transition:all 0.2s}
.card-btn:hover{background:#65b8ff}
.card-btn.soon{background:#272727;color:#aaa}
.card-btn.soon:hover{background:#333;color:#fff}
.card-btn img{width:18px;height:18px;object-fit:contain;border-radius:3px}
footer{background:#111;border-top:1px solid #272727;text-align:center;padding:20px;font-size:11px;color:#555;margin-top:20px}
</style>
</head>

        <span class="card-price-tag ${isSoon?'soon':''}">${isSoon?'Tez kunda':price+' so\'m'}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-specs">${specRows}</div>
        <a class="card-btn ${isSoon?'soon':''}" href="${isSoon?searchUrl:link}" target="_blank">
          <img src="${mktLogos[curMarket]}" alt="${curMarket}" onerror="this.style.display='none'">
          ${isSoon?'Tez kunda...':mktNames[curMarket]+' →'}
        </a>
      </div>
    </div>`;
  });
}

function selectM(m,el){
  document.querySelectorAll('.mkt-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');curMarket=m;render();
}
function selectC(c,el){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');curCat=c;render();
}
render();
</script>
</body>
</html>
